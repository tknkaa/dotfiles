# herdr configuration
# Deployed to ~/.config/herdr/config.toml by home-manager.
#
# herdr runs inside WezTerm and owns both tab and pane control (tmux-style).
# All actions go through the prefix key (Ctrl+a), so nothing collides with
# WezTerm or the desktop environment. WezTerm keeps only its fullscreen toggle.

[theme]
# Match WezTerm's Dracula+ color scheme.
name = "dracula"

[keys]
prefix = "ctrl+a"

# --- Tabs ---
new_tab = "prefix+b"        # 作成
close_tab = "prefix+x"      # 閉じる
previous_tab = "prefix+u"   # 前のタブ
next_tab = "prefix+i"       # 次のタブ
zoom = "prefix+n"           # 全画面 (ペインをズーム)

# --- Panes ---
split_vertical = "prefix+v"    # 右に分割
split_horizontal = "prefix+s"  # 下に分割
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
close_pane = "prefix+d"        # ペインを閉じる
